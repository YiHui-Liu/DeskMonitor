; =====================================================================
; PlatformIO Project Configuration
; ---------------------------------------------------------------------
; 框架：ESP-IDF v6.0.x（由 espressif32 platform 内置）
; 目标：esp32dev（ESP32-32E 模组，4MB Flash，无 PSRAM）
; 分区：partitions.csv（OTA 双槽 + LittleFS）
; =====================================================================

[env:esp32dev]
platform    = espressif32
board       = esp32dev
framework   = espidf

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
upload_port   = /dev/ttyUSB0
upload_speed  = 921600

; 自定义分区表（覆盖 board 默认）
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
; 让 LittleFS 镜像烧到 partitions.csv 里名为 "littlefs" 的分区
board_build.littlefs.data_dir = data
board_build.littlefs.partition = littlefs

; ESP-IDF 编译时的额外宏（次要手段；主要配置在 sdkconfig.defaults）
build_flags =
  ; 用新 atomic 实现避免某些 ESP-IDF v6 + xtensa 工具链的链接告警
  -DESP_IDF_BUILD

; 通过 IDF Component Registry 拉取的依赖声明在 src/idf_component.yml
; PlatformIO 在 ESP-IDF 框架下会自动调用 idf_component_manager
