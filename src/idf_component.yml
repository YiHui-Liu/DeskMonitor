# =====================================================================
# IDF Component Manager 依赖声明
# ---------------------------------------------------------------------
# PlatformIO 在 ESP-IDF 框架下，构建前会自动解析此文件，从
# https://components.espressif.com 拉取到 managed_components/<name>/
# =====================================================================
dependencies:
  # LVGL v9.5+ 核心
  lvgl/lvgl:
    version: "~9.5.0"

  # ESP-IDF esp_lcd 子驱动：ST7796S（我们这块 LCD 的驱动 IC）
  # 提供 esp_lcd_new_panel_st7796() 与 esp_lcd_panel_io_spi 配合使用
  espressif/esp_lcd_st7796:
    version: "^1.0.0"

  # LittleFS 文件系统（用于持久化配置、历史、Web 资源）
  joltwallet/littlefs:
    version: "^1.14"

  # cJSON 解析库（ESP-IDF v6 起从内置移到 Registry）
  espressif/cjson:
    version: "^1.7"
